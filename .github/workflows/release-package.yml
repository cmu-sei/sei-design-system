name: Release Package

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        registry-url: 'https://npm.pkg.github.com'
        # Defaults to the user or organization that owns the workflow file
        scope: '@cmu-sei'
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Convert registry in package-lock.json
      run: npm run change-registry-in-package-lock

    - name: Cache dependencies
      uses: actions/cache@v4
      id: cache
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}-${{ hashFiles('.nvmrc') }}

    - name: Verify version matches release tag
      run: |
        TAG="${{ github.event.release.tag_name }}"
        TAG="${TAG#v}"
        PKG_VERSION=$(node -p "require('./package.json').version")
        if [ "$TAG" != "$PKG_VERSION" ]; then
          echo "Error: Release tag ($TAG) does not match package.json version ($PKG_VERSION)"
          echo "Please ensure package.json is updated before creating the release"
          exit 1
        fi
        echo "✓ Version $PKG_VERSION matches release tag"

    - name: Install dependencies
      run: npm ci

    - name: Check whether version already published
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=$(node -p "require('./package.json').version")
        PKG_NAME=$(node -p "require('./package.json').name")
        echo "Checking registry for $PKG_NAME@$VERSION"
        if npm --registry=https://npm.pkg.github.com view "$PKG_NAME@$VERSION" >/dev/null 2>&1; then
          echo "Version $VERSION already exists in registry - aborting publish"
          exit 1
        fi

    - name: Lint components
      run: npm run lint
    
    - name: Test components
      run: npm test
    
    - name: Build components
      run: |
        printf "\nbuilding all components...\n"
        LIB_NAME=SeiDesignSystem LIB_ROOT=src/components npx vite build --config vite-library.config.js
        npx vue-tsc --declaration --emitDeclarationOnly --outDir dist/types

    - name: Generate Volar types
      run: |
        # Generate ./volar.d.ts that adds Types for Global Components
        printf "\nGenerating Volar types for global components...\n"
        npm run gen-volar-dts

    - name: Build Storybook
      run: npm run build-storybook

    - name: Publish dry-run
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm publish --dry-run

    - name: Publish package
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
