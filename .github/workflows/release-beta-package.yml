name: Release Beta Package

on:
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - develop
    paths:
      - 'open-sans/**'
      - 'public/**'
      - 'scripts/**'
      - 'source-serif/**'
      - 'src/**'
      - 'tailwindcss/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite-library.config.js'
      - 'vite.config.ts'
      - 'tsconfig.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'push' || (
        github.event.head_commit != null &&
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[no publish]') &&
        !contains(github.event.head_commit.message, 'chore: release v')
      )

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        registry-url: 'https://npm.pkg.github.com'
        # Defaults to the user or organization that owns the workflow file
        scope: '@cmu-sei'
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Convert registry in package-lock.json
      run: npm run change-registry-in-package-lock

    - name: Cache dependencies
      uses: actions/cache@v4
      id: cache
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}-${{ hashFiles('.nvmrc') }}

    - name: Install dependencies
      run: npm ci

    - name: Set package version to prerelease with commit SHA
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        BASE_VERSION=$(echo $CURRENT_VERSION | sed 's/-.*$//')
        # strip leading v if present
        BASE_VERSION="${BASE_VERSION#v}"
        npm version "${BASE_VERSION}-beta.${SHORT_SHA}" --no-git-tag-version
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "Beta version set to: $NEW_VERSION"

    - name: Update package-lock.json
      run: npm install --package-lock-only

    - name: Lint components
      run: npm run lint
    
    - name: Test components
      run: npm test

    - name: Check whether version already published
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=$(node -p "require('./package.json').version")
        PKG_NAME=$(node -p "require('./package.json').name")
        echo "Checking registry for $PKG_NAME@$VERSION"
        if npm --registry=https://npm.pkg.github.com view "$PKG_NAME@$VERSION" >/dev/null 2>&1; then
          echo "Version $VERSION already exists in registry - aborting publish"
          exit 1
        fi
    
    - name: Build components
      run: |
        printf "\nbuilding all components...\n"
        LIB_NAME=SeiDesignSystem LIB_ROOT=src/components npx vite build --config vite-library.config.js
        npx vue-tsc --declaration --emitDeclarationOnly --outDir dist/types

    - name: Generate Volar types
      run: |
        # Generate ./volar.d.ts that adds Types for Global Components
        printf "\nGenerating Volar types for global components...\n"
        npm run gen-volar-dts

    - name: Build Storybook
      run: npm run build-storybook

    - name: Publish dry-run
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm publish --tag beta --dry-run

    - name: Publish package
      run: npm publish --tag beta
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}